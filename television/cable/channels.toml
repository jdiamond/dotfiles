[metadata]
name = "channels"
description = "Select a television channel"
requirements = ["tv", "bat"]

[source]
command = ["tv list-channels"]

[preview]
command = "bat -pn --color always ${TELEVISION_CONFIG:-${XDG_CONFIG_HOME:-$HOME/.config}/television}/cable/{}.toml"
shell = "bash"

[keybindings]
enter = "actions:channel-enter"
ctrl-e = "actions:edit"

[actions.channel-enter]
description = "Enter a television channel"
command = "tv {}"
mode = "execute"

[actions.edit]
description = "Open the channel source in editor"
command = "${EDITOR:-nvim} ${TELEVISION_CONFIG:-${XDG_CONFIG_HOME:-$HOME/.config}/television}/cable/{}.toml"
mode = "fork"
