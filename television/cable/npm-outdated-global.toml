[metadata]
name = "npm-outdated-global"
description = "Outdated global npm packages"
requirements = ["npm", "jq"]

[source]
command = '''
npm outdated -g --long --json 2>/dev/null | jq -r '
  to_entries[] |
  "\(.key)\t\(.value.current)\t\(.value.latest)\t\(.value.homepage // "https://www.npmjs.com/package/\(.key)")"
' || echo "All packages up to date\t\t\t"
'''
display = "{split:\t:0|pad:36: :right}  {split:\t:1} → {split:\t:2}"
output = "{split:\t:0}"
no_sort = true

[preview]
command = '''
echo -e "\033[1;36m{split:\t:0}\033[0m"
echo -e "\033[1;33mCurrent:\033[0m {split:\t:1}"
echo -e "\033[1;32mLatest:\033[0m  {split:\t:2}"
echo ""
echo -e "\033[1;34m\033[4m{split:\t:3}\033[0m"
'''

[actions.open]
description = "Open homepage in browser"
command = "open '{split:\t:3}'"
mode = "fork"

[actions.update]
description = "Update to latest version"
command = "npm install -g '{split:\t:0}@latest'"
mode = "execute"